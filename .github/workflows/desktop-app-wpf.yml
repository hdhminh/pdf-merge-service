name: Desktop App WPF CI

on:
  push:
    paths:
      - "desktop-app-wpf/**"
      - "desktop-app-wpf.tests/**"
      - ".github/workflows/desktop-app-wpf.yml"
  pull_request:
    paths:
      - "desktop-app-wpf/**"
      - "desktop-app-wpf.tests/**"
      - ".github/workflows/desktop-app-wpf.yml"
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci --omit=dev

      - name: Ensure bundled Node runtime
        shell: pwsh
        run: |
          $targetDir = "bin/node-win-x64"
          $targetExe = Join-Path $targetDir "node.exe"
          if (Test-Path $targetExe) {
            Write-Host "Using existing Node runtime: $targetExe"
            exit 0
          }

          $nodeVersion = (node -p "process.version").TrimStart('v')
          if (-not $nodeVersion) {
            throw "Cannot resolve Node version."
          }

          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP "node-v$nodeVersion-win-x64.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "node-portable-win-x64"
          $url = "https://nodejs.org/dist/v$nodeVersion/node-v$nodeVersion-win-x64.zip"

          Invoke-WebRequest -Uri $url -OutFile $zipPath
          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $expandedRoot = Get-ChildItem -Path $extractDir -Directory | Select-Object -First 1
          if ($null -eq $expandedRoot) {
            throw "Cannot extract bundled Node runtime."
          }

          Copy-Item -Path (Join-Path $expandedRoot.FullName "*") -Destination $targetDir -Recurse -Force
          if (-not (Test-Path $targetExe)) {
            throw "node.exe was not found after extraction."
          }

      - name: Ensure bundled ngrok
        shell: pwsh
        run: |
          $targetDir = "bin/win32-x64"
          $targetExe = Join-Path $targetDir "ngrok.exe"
          if (Test-Path $targetExe) {
            Write-Host "Using existing ngrok binary: $targetExe"
            exit 0
          }

          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP "ngrok-v3-windows-amd64.zip"
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $targetDir -Force

          if (-not (Test-Path $targetExe)) {
            throw "ngrok.exe was not found after extraction."
          }

      - name: Restore
        run: dotnet restore pdf-merge-service.sln

      - name: Build
        run: dotnet build pdf-merge-service.sln -c Release --no-restore

      - name: Build signature-field tool
        run: dotnet build tools/signature-field-tool/SignatureFieldTool/SignatureFieldTool.csproj -c Release

      - name: Test
        run: dotnet test pdf-merge-service.sln -c Release --no-build

      - name: Publish single EXE
        run: |
          dotnet publish desktop-app-wpf/PdfStampNgrokDesktop.csproj `
            -c Release `
            -r win-x64 `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o artifacts/win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ngrok-sao-y-dien-tu-pdf-win-x64
          path: artifacts/win-x64/*
