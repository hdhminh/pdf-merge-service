name: Desktop App WPF Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (semver), vd: 1.4.0"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        type: choice
        default: stable
        options:
          - stable
          - beta
      feed_repo_url:
        description: "Optional update feed repo URL (https://github.com/<owner>/<repo>)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $defaultFeedRepoUrl = "https://github.com/${{ github.repository }}"
          $configuredFeedRepoUrl = "${{ vars.UPDATE_FEED_REPO_URL }}".Trim()
          $inputFeedRepoUrl = "${{ inputs.feed_repo_url }}".Trim()

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}".Trim()
            $channel = "${{ inputs.channel }}".Trim().ToLowerInvariant()
            $feedRepoUrl = if ($inputFeedRepoUrl) { $inputFeedRepoUrl } elseif ($configuredFeedRepoUrl) { $configuredFeedRepoUrl } else { $defaultFeedRepoUrl }
          }
          else {
            $version = "${{ github.ref_name }}".TrimStart('v')
            $channel = "stable"
            $feedRepoUrl = if ($configuredFeedRepoUrl) { $configuredFeedRepoUrl } else { $defaultFeedRepoUrl }
          }

          if (-not $version) { throw "Version is required." }
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z\.-]+)?$') {
            throw "Invalid semver version: $version"
          }

          if ($channel -notin @("stable", "beta")) {
            throw "Invalid channel: $channel"
          }

          $feedRepoUrl = $feedRepoUrl.TrimEnd('/')
          if ($feedRepoUrl.EndsWith(".git")) {
            $feedRepoUrl = $feedRepoUrl.Substring(0, $feedRepoUrl.Length - 4)
          }

          if ($feedRepoUrl -notmatch '^https://github\.com/[^/]+/[^/]+$') {
            throw "Invalid feed repo URL: $feedRepoUrl"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "feed_repo_url=$feedRepoUrl" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci --omit=dev

      - name: Prune backend dependency payload
        shell: pwsh
        run: |
          $root = "node_modules"
          if (-not (Test-Path $root)) {
            throw "node_modules not found after npm ci."
          }

          function Get-DirSizeMb([string]$path) {
            $sum = (Get-ChildItem -Path $path -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
            if ($null -eq $sum) { return 0.0 }
            return [math]::Round($sum / 1MB, 2)
          }

          $beforeMb = Get-DirSizeMb $root
          $pruneDirNames = @("test", "tests", "__tests__", "doc", "docs", "example", "examples", "benchmark", "benchmarks", ".github", ".vscode", ".idea", "coverage")
          Get-ChildItem -Path $root -Directory -Recurse -Force -ErrorAction SilentlyContinue |
            Where-Object { $pruneDirNames -contains $_.Name.ToLowerInvariant() } |
            ForEach-Object { Remove-Item -Path $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }

          Get-ChildItem -Path $root -File -Recurse -Filter "*.map" -ErrorAction SilentlyContinue |
            Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $root -File -Recurse -Filter "*.tsbuildinfo" -ErrorAction SilentlyContinue |
            Remove-Item -Force -ErrorAction SilentlyContinue

          $afterMb = Get-DirSizeMb $root
          Write-Host "node_modules size before prune: $beforeMb MB"
          Write-Host "node_modules size after prune:  $afterMb MB"

      - name: Ensure bundled Node runtime
        shell: pwsh
        run: |
          $targetDir = "bin/node-win-x64"
          $targetExe = Join-Path $targetDir "node.exe"
          if (Test-Path $targetExe) {
            Write-Host "Using existing Node runtime: $targetExe"
            exit 0
          }

          $nodeVersion = (node -p "process.version").TrimStart('v')
          if (-not $nodeVersion) {
            throw "Cannot resolve Node version."
          }

          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP "node-v$nodeVersion-win-x64.zip"
          $shaPath = Join-Path $env:RUNNER_TEMP "SHASUMS256.txt"
          $extractDir = Join-Path $env:RUNNER_TEMP "node-portable-win-x64"
          $url = "https://nodejs.org/dist/v$nodeVersion/node-v$nodeVersion-win-x64.zip"

          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v$nodeVersion/SHASUMS256.txt" -OutFile $shaPath
          $expectedLine = Get-Content $shaPath | Where-Object { $_ -match " node-v$nodeVersion-win-x64.zip$" } | Select-Object -First 1
          if (-not $expectedLine) {
            throw "Cannot resolve Node checksum from SHASUMS256.txt."
          }
          $expectedHash = ($expectedLine -split "\s+")[0].Trim().ToLowerInvariant()
          $actualHash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "Node runtime checksum mismatch. expected=$expectedHash actual=$actualHash"
          }

          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $expandedRoot = Get-ChildItem -Path $extractDir -Directory | Select-Object -First 1
          if ($null -eq $expandedRoot) {
            throw "Cannot extract bundled Node runtime."
          }

          Copy-Item -Path (Join-Path $expandedRoot.FullName "*") -Destination $targetDir -Recurse -Force
          if (-not (Test-Path $targetExe)) {
            throw "node.exe was not found after extraction."
          }

      - name: Ensure bundled ngrok
        shell: pwsh
        run: |
          $targetDir = "bin/win32-x64"
          $targetExe = Join-Path $targetDir "ngrok.exe"
          if (Test-Path $targetExe) {
            Write-Host "Using existing ngrok binary: $targetExe"
            exit 0
          }

          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP "ngrok-v3-windows-amd64.zip"
          $expectedHash = "${{ vars.NGROK_WIN_AMD64_SHA256 }}".Trim().ToLowerInvariant()
          if (-not $expectedHash) {
            $expectedHash = "2cf6f8bce5e642b26f147c46423d4ce7f70528450038201eb114519162a98281"
          }

          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile $zipPath
          $actualHash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "ngrok zip checksum mismatch. expected=$expectedHash actual=$actualHash. Update NGROK_WIN_AMD64_SHA256 after verifying vendor binary."
          }

          Expand-Archive -Path $zipPath -DestinationPath $targetDir -Force

          if (-not (Test-Path $targetExe)) {
            throw "ngrok.exe was not found after extraction."
          }

      - name: Install Velopack CLI
        run: dotnet tool update -g vpk

      - name: Add .NET tools to PATH
        shell: pwsh
        run: |
          "$env:USERPROFILE\\.dotnet\\tools" >> $env:GITHUB_PATH

      - name: Restore
        run: dotnet restore pdf-merge-service.sln

      - name: Build
        run: dotnet build pdf-merge-service.sln -c Release --no-restore

      - name: Build signature-field tool
        run: dotnet build tools/signature-field-tool/SignatureFieldTool/SignatureFieldTool.csproj -c Release

      - name: Publish signature-field tool (self-contained)
        run: |
          dotnet publish tools/signature-field-tool/SignatureFieldTool/SignatureFieldTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o tools/signature-field-tool/SignatureFieldTool/publish/win-x64

      - name: Test
        run: dotnet test pdf-merge-service.sln -c Release --no-build

      - name: Publish app
        run: |
          dotnet publish desktop-app-wpf/PdfStampNgrokDesktop.csproj `
            -c Release `
            -r win-x64 `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=${{ steps.meta.outputs.version }} `
            -p:UpdateRepoUrl=${{ steps.meta.outputs.feed_repo_url }} `
            -p:UpdateChannel=${{ steps.meta.outputs.channel }} `
            -o artifacts/publish/win-x64

      - name: Smoke test packaged app/runtime
        shell: pwsh
        run: |
          $appExe = "artifacts/publish/win-x64/PdfStampNgrokDesktop.exe"
          if (-not (Test-Path $appExe)) {
            throw "Smoke test blocked: app exe not found at $appExe"
          }

          $env:SMOKE_TEST_PORT = "39030"
          $process = Start-Process -FilePath $appExe -ArgumentList "--smoke-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Smoke test failed with exit code $($process.ExitCode)"
          }

      - name: Pack Velopack release
        run: |
          vpk pack `
            --packId PdfStampNgrokDesktop `
            --packVersion ${{ steps.meta.outputs.version }} `
            --packDir artifacts/publish/win-x64 `
            --mainExe PdfStampNgrokDesktop.exe `
            --packTitle "Ngrok Sao Y Dien Tu PDF" `
            --packAuthors "PDF Stamp Team" `
            --icon desktop-app-wpf/Assets/app.ico `
            --runtime win-x64 `
            --channel ${{ steps.meta.outputs.channel }} `
            --outputDir artifacts/releases

      - name: Upload release to GitHub
        shell: pwsh
        env:
          SOURCE_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_FEED_PAT: ${{ secrets.UPDATE_FEED_PAT }}
        run: |
          $sourceRepoUrl = "https://github.com/${{ github.repository }}"
          $targetRepoUrl = "${{ steps.meta.outputs.feed_repo_url }}"

          $token = $env:SOURCE_GH_TOKEN
          if ($targetRepoUrl -ne $sourceRepoUrl) {
            if (-not $env:UPDATE_FEED_PAT) {
              throw "Missing secret UPDATE_FEED_PAT for cross-repo release upload."
            }
            $token = $env:UPDATE_FEED_PAT
          }

          $args = @(
            "upload", "github",
            "--repoUrl", $targetRepoUrl,
            "--token", $token,
            "--outputDir", "artifacts/releases",
            "--channel", "${{ steps.meta.outputs.channel }}",
            "--tag", "${{ steps.meta.outputs.tag }}",
            "--releaseName", "${{ steps.meta.outputs.tag }}",
            "--merge",
            "--publish"
          )

          if ($targetRepoUrl -eq $sourceRepoUrl) {
            $args += @("--targetCommitish", "${{ github.sha }}")
          }

          if ("${{ steps.meta.outputs.channel }}" -eq "beta") {
            $args += "--pre"
          }

          & vpk @args

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ steps.meta.outputs.channel }}-${{ steps.meta.outputs.version }}
          path: artifacts/releases/*
